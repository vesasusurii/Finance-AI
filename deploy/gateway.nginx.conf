server {
    listen 80;
    server_name _;

    # Invoice/bank uploads can be large PDFs/images.
    client_max_body_size 50m;

    # Single-origin reverse proxy: browser only ever talks to this gateway,
    # which satisfies the frontend CSP (connect-src 'self').
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve the original scheme (Azure Container Apps terminates TLS
        # and forwards X-Forwarded-Proto) so secure cookies work.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://frontend-prod:80;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Internal Container Apps ingress routes by Host; use the upstream app name.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
