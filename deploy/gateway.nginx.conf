server {
    listen 80;
    server_name _;

    # Invoice/bank uploads can be large PDFs/images.
    client_max_body_size 50m;

    # Azure ingress terminates TLS and forwards X-Forwarded-Proto; fall back to
    # the connection scheme when the header is absent (internal hops).
    set $forwarded_proto $http_x_forwarded_proto;
    if ($forwarded_proto = "") {
        set $forwarded_proto $scheme;
    }

    # Single-origin reverse proxy: browser only ever talks to this gateway,
    # which satisfies the frontend CSP (connect-src 'self').
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://frontend-prod:80;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Internal Container Apps ingress routes by Host; use the upstream app name.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
