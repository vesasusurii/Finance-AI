# Shared Content-Security-Policy for the Borek Finance SPA.
# Included by infra/nginx/nginx.conf and infra/nginx/nginx-frontend.conf.
# script-src stays strict (no unsafe-inline). React DOM oninput probing is
# neutralised in frontend/public/theme-init.js before the app bundle loads.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'" always;
