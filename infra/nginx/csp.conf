# Shared Content-Security-Policy for the Borek Finance SPA.
# Included by infra/nginx/nginx.conf and infra/nginx/nginx-frontend.conf.
# script-src allows 'self' plus a hash for the inline CSP polyfill in index.html
# (frontend/scripts/csp-polyfill-inline.js — regenerate hash via npm run csp:hash).
# frame-src 'self' blob: and object-src 'self' blob: let the browser's native
# PDF viewer embed invoice previews loaded as blob: URLs.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-2wgY1/nAXVkYvqCbmWduIo3B/hiSMXG4t6fofEbYkI0='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; frame-src 'self' blob:; object-src 'self' blob:; frame-ancestors 'none'" always;
