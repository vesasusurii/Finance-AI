# Shared Content-Security-Policy for the Borek Finance SPA.
# Included by infra/nginx/nginx.conf and infra/nginx/nginx-frontend.conf.
# script-src allows 'self' plus a hash for the inline CSP polyfill in index.html
# (frontend/scripts/csp-polyfill-inline.js — regenerate hash via npm run csp:hash).
# frame-src 'self' blob: allows the native PDF <iframe> fallback (same-origin
# /api/invoices/{id}/file, preferred) plus blob: fallback; object-src 'self' blob:
# lets Chrome's internal PDF viewer embed the document.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-xeicYgLgGH0IzHWHlasPY5gQttPuxkFr9esvZDB3WkQ='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'self' blob:; frame-ancestors 'none'" always;
