# Borek Finance — local team stack (starter)
# Docs: DOCS/12. Deployment & Environments 1.md
#
# Default:  db + backend + worker + redis
# Frontend: docker compose --profile full up -d --build
# n8n:      docker compose --profile n8n up -d
# ngrok:    docker compose --profile tunnel up -d  (expose API for n8n Cloud)

services:
  db:
    image: postgres:16-alpine
    container_name: finance-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-finance_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finance-ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-ai-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Use DATABASE_URL from .env (Supabase or local). Do not hardcode @db here — that overrides .env.
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      # Inside Compose, localhost is the container itself — use the redis service hostname.
      REDIS_URL: redis://redis:6379/0
      QUEUE_MODE: ${QUEUE_MODE:-adaptive}
      STORAGE_PATH: /data/uploads
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-invoices}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODEL_STRONG: ${OPENAI_MODEL_STRONG:-gpt-4o}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - upload_data:/data/uploads
      # Persist debug logs on host so they survive container restarts
      - ./logs:/var/log/borek
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-ai-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-2}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      REDIS_URL: redis://redis:6379/0
      QUEUE_MODE: ${QUEUE_MODE:-adaptive}
      STORAGE_PATH: /data/uploads
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-invoices}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODEL_STRONG: ${OPENAI_MODEL_STRONG:-gpt-4o}
    volumes:
      - ./backend:/app
      - upload_data:/data/uploads
      - ./logs:/var/log/borek
    command: >
      rq worker --url redis://redis:6379/0
      finance-ai ocr_high_priority ocr_normal review transaction

  frontend:
    profiles: ["full"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: finance-ai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      # Empty base URL = browser calls /api on :5173; Vite proxies to backend (cookie-friendly)
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_BRANDING_DIR: /branding
      VITE_JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-15}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - ./DOCS/branding:/branding
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  n8n:
    profiles: ["n8n"]
    image: n8nio/n8n:1.95.3
    container_name: finance-ai-n8n
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-Europe/Berlin}
      TZ: ${N8N_TIMEZONE:-Europe/Berlin}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me_n8n_password}
      # Expose to workflow expressions ($env.FINANCE_API_URL, etc.)
      N8N_ENVIRONMENT_VARIABLES_ALLOWLIST: FINANCE_API_URL,EMAIL_INGEST_API_KEY,OUTLOOK_FOLDER
      FINANCE_API_URL: http://backend:8000
      EMAIL_INGEST_API_KEY: ${EMAIL_INGEST_API_KEY:-}
      OUTLOOK_FOLDER: ${OUTLOOK_FOLDER:-Inbox}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/import-workflows:ro

  ngrok:
    profiles: ["tunnel"]
    image: ngrok/ngrok:latest
    container_name: finance-ai-ngrok
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env — get it from https://dashboard.ngrok.com/get-started/your-authtoken}
    command:
      - http
      - backend:8000
      - --log=stdout
      - --log-format=logfmt
    ports:
      - "${NGROK_INSPECT_PORT:-4040}:4040"

volumes:
  postgres_data:
  upload_data:
  n8n_data:
