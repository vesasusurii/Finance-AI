name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: test
          POSTGRES_DB: finance_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance -d finance_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://finance:test@localhost:5432/finance_ai_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars
      OPENAI_API_KEY: sk-ci-placeholder
      CORS_ORIGINS: http://localhost:5173
      STORAGE_PATH: /tmp/finance-ai-ci-uploads
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Verify app imports
        working-directory: backend
        run: python -c "from main import app; assert app is not None"

      - name: Run unit tests
        working-directory: backend
        run: pytest tests -m "not integration" -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
