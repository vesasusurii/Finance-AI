name: Deploy to Azure

# Auto-deploy on every push to main (by anyone on the team).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only one deploy at a time; a newer push cancels an in-progress one.
concurrency:
  group: deploy-azure
  cancel-in-progress: false

permissions:
  id-token: write      # required for Azure OIDC login
  contents: read

env:
  RESOURCE_GROUP: finance-ai
  ACR_NAME: financeaiborek
  ACR_LOGIN_SERVER: financeaiborek.azurecr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build images and roll out Container Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry "$ACR_NAME" \
              --image "finance-backend:$IMAGE_TAG" \
              --image "finance-backend:latest" \
              --file backend/Dockerfile \
              backend

      - name: Build frontend image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry "$ACR_NAME" \
              --image "finance-frontend:$IMAGE_TAG" \
              --image "finance-frontend:latest" \
              --file frontend/Dockerfile.prod \
              .

      - name: Build gateway image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry "$ACR_NAME" \
              --image "finance-gateway:$IMAGE_TAG" \
              --image "finance-gateway:latest" \
              --file deploy/gateway.Dockerfile \
              deploy

      - name: Deploy backend
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name backend --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_LOGIN_SERVER/finance-backend:$IMAGE_TAG"

      - name: Deploy worker
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name worker --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_LOGIN_SERVER/finance-backend:$IMAGE_TAG"

      - name: Deploy frontend
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name frontend-prod --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_LOGIN_SERVER/finance-frontend:$IMAGE_TAG"

      - name: Deploy gateway
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name gateway --resource-group "$RESOURCE_GROUP" \
              --image "$ACR_LOGIN_SERVER/finance-gateway:$IMAGE_TAG"

      - name: Deployment summary
        run: |
          echo "Deployed commit $IMAGE_TAG to Azure Container Apps." >> "$GITHUB_STEP_SUMMARY"
          echo "App URL: https://gateway.bluesand-b9ebbc09.germanywestcentral.azurecontainerapps.io/" >> "$GITHUB_STEP_SUMMARY"
